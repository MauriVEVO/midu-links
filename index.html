<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mauri.links - Enlaces de mauri y cursos</title>
    <link rel="stylesheet" href="./assets/output.css" />
  </head>

  <body
    class="max-w-xl mx-auto min-h-dvh bg-gradient-to-b from-black via-sky-950 to-gray-800"
  >
    <header class="text-white">
      <img
        src="./assets/Mauri.jpeg"
        alt="mauri xd"
        class="w-full h-[50vh] object-cover mx-auto mask-radial-at-center mask-radial-from-45% mask-radial-to-80%"
      />

      <header class="flex flex-col justify-center items-center mb-8 -mt-4">
        <span
          class="text-sky-400 text-xl font-mono px-3 py-1 border border-sky-500/50 rounded-full flex items-center justify-center shadow-sm bg-black/65 cursor-crosshair z-10"
        >
          @MauriVEVO
          <svg
            class="ml-1 w-5 h-5 text-sky-400 inline"
            fill="currentColor"
            viewBox="0 0 20 20"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707a1 1 0 00-1.414-1.414L9 11.172l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
              clip-rule="evenodd"
            />
          </svg>
        </span>

        <h1 class="text-3xl font-extrabold leading-tight mt-1">
          Mauricio Mazier
        </h1>
      </header>

      <section class="flex gap-2 justify-center">
        <a
          class="bg-purple-100 social-button"
          href="https://www.twitch.tv/MauriVEVO"
          target="_blank"
          aria-label="Twitch"
          title="ir a Twitch de @MauriVEVO"
        >
          <svg width="28" height="28">
            <use xlink:href="./assets/sprite.svg#twitch"></use>
          </svg>
        </a>

        <a
          class="bg-zinc-900 social-button"
          href="https://www.github.com/MauriVEVO"
          target="_blank"
          aria-label="GitHub"
          title="ir a GitHub de @MauriVEVO"
        >
          <svg width="28" height="28">
            <use xlink:href="./assets/sprite.svg#github"></use>
          </svg>
        </a>

        <a
          class="bg-gradient-to-br from-purple-600 via-pink-500 to-orange-400 social-button"
          href="https://www.instagram.com/mauriciciomazier"
          target="_blank"
          aria-label="Instagram"
          title="ir a Instagram de @mauriciciomazier"
        >
          <svg width="28" height="28">
            <use xlink:href="./assets/sprite.svg#instagram"></use>
          </svg>
        </a>

        <a
          class="bg-white social-button"
          href="https://www.youtube.com"
          target="_blank"
          aria-label="YouTube"
          title="ir a YouTube de @MauriVEVO"
        >
          <svg width="28" height="28">
            <use xlink:href="./assets/sprite.svg#youtube"></use>
          </svg>
        </a>

        <a
          class="bg-black social-button"
          href="https://www.x.com"
          target="_blank"
          aria-label="X"
          title="ir a X de @MauriVEVO"
        >
          <svg width="28" height="28">
            <use xlink:href="./assets/sprite.svg#x"></use>
          </svg>
        </a>

        <a
          class="bg-white social-button"
          href="https://www.linkedin.com"
          target="_blank"
          aria-label="LinkedIn"
          title="ir a LinkedIn de @MauriVEVO"
        >
          <svg width="28" height="28">
            <use xlink:href="./assets/sprite.svg#linkedin"></use>
          </svg>
        </a>
      </section>

      <p class="text-mauri-lol text-center mt-4 text-sm px-4 text-balance">
        Divulgador de programación, streamer y creador de contenido. Enseñando
        JavaScript, React, Node.js de forma divertida
      </p>

      <main class="pt-4 px-4">
        <div class="grid grid-cols-3 grid-rows-2 gap-2 w-full">
          <a
            href="https://cursoreact.dev"
            class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-cyan-900 via-cyan-700 to-cyan-500 border border-cyan-900 flex flex-col items-start hover:scale-105 hover:contrast-125 transition group col-span-2 p-7 min-h-[180px]"
          >
            <span
              class="absolute bottom-2 left-4 font-bold text-2xl group-hover:translate-y-1 transition-transform"
            >
              React.js
            </span>
            <svg
              class="absolute -right-4 -bottom-4 -rotate-6 size-28 group-hover:-rotate-12 group-hover:scale-125 transition-transform"
              width="100"
              height="100"
            >
              <use xlink:href="./assets/sprite.svg#react"></use>
            </svg>
            <span
              class="absolute top-2 left-4 text-xs border rounded-xl px-1 py-0.5"
              >Curso de +14 clases</span
            >
          </a>

          <a
            href="https://midu.links/html"
            class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-deep-sky-900 via-deep-sky-700 to-deep-sky-500 border border-deep-sky-900 flex flex-col items-start hover:scale-105 hover:contrast-125 transition group col-span-1 p-7 min-h-[180px]"
          >
            <span
              class="absolute bottom-2 left-4 font-bold text-2xl group-hover:translate-y-1 transition-transform"
            >
              HTML
            </span>
            <svg
              class="absolute -right-4 -bottom-4 -rotate-6 size-28 group-hover:-rotate-12 group-hover:scale-125 transition-transform"
              width="100"
              height="100"
            >
              <use xlink:href="./assets/sprite.svg#html"></use>
            </svg>
            <span
              class="absolute top-2 left-4 text-xs border rounded-xl px-1 py-0.5"
              >Para principiantes</span
            >
          </a>

          <a
            href="https://cursoreact.dev"
            class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-deep-purple-900 via-deep-purple-700 to-deep-purple-500 border border-deep-purple-900 flex flex-col items-start hover:scale-105 hover:contrast-125 transition group col-span-2 p-7 min-h-[180px]"
          >
            <span
              class="absolute bottom-2 left-4 font-bold text-2xl group-hover:translate-y-1 transition-transform"
            >
              Node.js
            </span>
            <svg
              class="absolute -right-4 -bottom-4 -rotate-6 size-28 group-hover:-rotate-12 group-hover:scale-125 transition-transform"
              width="100"
              height="100"
            >
              <use xlink:href="./assets/sprite.svg#node"></use>
            </svg>
            <span
              class="absolute top-2 left-4 text-xs border rounded-xl px-1 py-0.5"
              >Curso de +14 clases</span
            >
          </a>
        </div>
      </main>
    </header>
  </body>
</html>
